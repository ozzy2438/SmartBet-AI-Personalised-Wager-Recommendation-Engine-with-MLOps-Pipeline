name: smartbet-mlops-pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      SMARTBET_TRAINING_EPOCHS: "2"
      SMARTBET_BATCH_SIZE: "64"
      SMARTBET_N_USERS: "200"
      SMARTBET_N_MARKETS: "300"
      SMARTBET_N_INTERACTIONS: "2000"
      SMARTBET_N_NEGATIVES: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run data pipeline
        run: |
          python src/data_generation.py
          python src/data_validation.py
          python src/feature_engineering.py

      - name: Run training and evaluation
        run: |
          python src/train.py
          python src/evaluate.py
          python src/drift_check.py
          python src/register_model.py

      - name: Smoke test API and dashboard imports
        run: |
          python -c "import api.serve"
          python -c "import dashboard.app"
